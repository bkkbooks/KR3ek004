front:
  text: 序余少讀書嘗聞先哲云為人子者不可不知醫於是遇好方書輒喜傳録纍至數十帙見有疾者如切己身常製藥施與一日先君子訓曰施人以藥不若施人以方則所濟者廣從而有已驗之方必與樂善之士共及冥棲方外悉棄舊學況經塵劫煨燼無遺僅外科集驗方一帙乃禾川楊清叟所編述以授吳寧極寧極之子有本以授西平善觀李先生先生以授於宜真者其方簡要惜未版行故獨存之昨來遊金精福地道經雩都吾徒蕭天倪鳳岡本西昌望族自幼學道於紫陽觀二十載前嘗從豫遊亦能召風雨濟旱潦蓋道緣深重履踐端恪之所致也其師弟劉致柔順川數年間遍身苦瘡癤服荊煎湯敗毒散諸藥俱不效豫因以外科方授之用返魂湯未終劑而愈天倪乃欣然捐己資繡梓散施流通其慧濟之意如此則雨暘之應禱也宜哉雖然豫有故人曾害鼓椎風往來寒熱數月伏枕諸藥不能療最後一醫士診之曰雖成痼疾而有客邪在少陽經未解若曾服五積散則誤矣詢之果然因授小柴胡湯數服寒熱頓除卻用本科追風丸等藥理其風證而全瘳矣夫雜病有方傷寒有法二者兼盡其道乃為良醫若以大方外科各專其一正恐或有所誤而不自知則又豈能全美乎此外科論證處方雖極其造理校於諸方為獨優在圓機之士臨證之時尤當加審焉洪武戊午九月朔日浚儀原陽子趙宜真序醫之為藝尚矣自神農氏始嘗百草辨溫涼寒熱之性以濟民於夭枉其功莫大焉厥後扁鵲華他最精於技治療之法效驗如神惜其術不盡傳今之外科乃其緒餘也外科之證癰疽為甚蓋疽有陰陽虛實之不同用藥稍差則立至殆其次如疔瘡咽喉之屬尤易以殺人世之工外科者固為不少求其能精類不多見浚儀原陽趙練師以通儒名家學於老氏道行高潔超邁輩流處心切於濟人以平昔所獲奇異方書匯聚成帙中經兵火散失唯外科方僅存戊午秋挾其書遊金精寓雩都之紫陽觀蓋二十年前嘗以道法授其觀之高士蕭鳳岡今而重過又能愈其徒劉順川積年不治之瘡疾鳳岡即欲版行以廣其扶危救急之意而雩都谷邑艱於得匠因循至壬戌夏五月而原陽仙化遺命囑其徒劉淵然終其志淵然佩服不敢違仍將所授祕方總編為一卷復遇釜江謝安達慨然任其事凡工匠供饋之費悉出於己其子允原允恭能如父志與一門少長互相讚美誠可嘉尚觀原陽之自敘與鳳岡之捐資版行其用心皆極其忠厚然非淵然次第集録則不能就一全書淵然遊心方外屏絶俗紛獨拳拳篤於濟人信可謂賢矣若非安達力為玉成則鳳岡雖欲廣其傳亦不可得安達豈不尤賢矣乎是書之行可以拯危急利倉卒使凡為人子者皆得此書可不陷於不孝使凡為醫者皆得此書可不墮於不仁則仁人孝子之心具在此吾鄉前輩申齊劉先生本草單方序語也豫故為淵然誦之庶幾不負其編輯之勤也洪武陽復月廬陵友蘭父吳有壬序
