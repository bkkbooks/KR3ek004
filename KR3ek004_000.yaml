body:
  text: 敘論癰疽發背第一外科冠癰疽於雜病之先者變故生於頃刻性命懸於毫髮故也夫癰疽之名雖有二十餘證而其要有二何則陰陽二證而已發於陽者為癰為熱為實發於陰者為疽為冷為虛故陽發則皮薄色赤腫高多有椒眼數十而痛陰發則皮厚色淡腫硬狀如牛頸之皮而不痛又有陽中之陰似熱而非熱雖腫而實虛若赤而不燥欲痛而無膿既浮而復消外盛而內腐陰中之陽似冷而非冷不腫而實赤微而燥有膿而痛外雖不盛而內實煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實而又有陽變而為陰者草醫涼劑之過也陰變而為陽者大方熱藥之驟也然陽變陰者其證多猶可返於陽故多生陰變而陽者其證少不復能為陽矣故多死然間有生者此醫偶合於法百中得一耳所謂發者積於中而發於外也大抵人之一身皆本於五臟五臟之氣皆稟於胃氣胃為五臟之根本故胃受谷脾化之以生氣脾生肌肉胃氣傳五臟而行血脈以經絡一身而晝夜一周雖癰疽有虛實寒熱皆由氣鬱而成其因有三內因外因不內外因內因候於人迎人迎者左手關前一分也外因候於氣口氣口者右手關前一分也人迎氣口之脈和平則為不內外因也其原有五一天行時氣二七情內郁三體虛外感四身熱搏於風冷五食炙爆飲法酒服丹石等熱毒以此五者為邪氣鬱於胃中胃氣盛而體實則邪氣相搏而流注於經絡澀於所滯血脈會聚壅結而成癰胃氣弱而體虛則邪氣盛而宿於經絡凝澀流積血脈不潮內腐而成疽故曰外形如粟中可容谷外貌如錢里可著拳惡毒膿管寸長深滿膿血交黏用藥可痊臭穢無絲血敗氣衰陽絶陰盛神仙難醫醫之用藥當量人虛實察病冷熱推其所因究其所原而後治之使內外相應不可一概而論如病發於陽而極熱則當有順其氣勻其血氣順則陽氣宣通而不滯血勻則血脈流動而自散蓋氣為陽血為陰陰陽調和病者自安外則用涼藥而蠲之熱盛則血得涼而易散不散則熱已痿而血凝於涼此陽變為陰之漸乃壞爛之根也急歸溫涼以治之解其外攻四圍之血路出其中間已成之膿毒然後依法以收其功也如病發於陰而極冷則內用平補之藥以宣其氣滋其血助其元陽從其脾胃待其飲食進精神回然後順氣勻血如常法外因熱藥以潮會一身之氣血回死肌拔毒氣然後用溫藥以散之其極冷者而又為涼藥所誤者不得已於三建而回陽則病必不出再作方為佳此陰變為陽之候更生之兆也若內陽不回外證不見是為獨陽絶陰不可為矣蓋陽者氣也陰者血也陽動則陰隨氣運則血行氣不運而血死血死則肌死肌死則病死矣冷證則用熱藥者不過行其氣血也蓋血氣遇熱則行遇涼則止也雖然冷熱之藥用之固妙尤當先乳香豆粉救其心護其膜蓋心為一身之主宰膜為五臟之囊橐病之初發毒必上攻心胞絡故先嘔逆而後癰疽或先癰疽而後嘔逆者胞絡根於心也苟治之不早則心主受毒神無所舍元氣昏瞑矣病之初發毒必旁腑肌肉苟治之不早則毒氣透膜膜透則元氣泄臟腑失養精神枯槁脈壞絶矣故病至盛而生者內見五臟而膜完全者也亦有至微而死者肌肉未潰而膜先透者也此救心護膜所以為第一義歟是方乃遇神仙祕授神聖工巧不可具述非尋常草醫一草一木一針一刀之比得其要者寶之寶之服藥通變方第二榮衛返魂湯又名通順散又名何首烏散何首烏不犯鐵當歸木通去皮節赤芍藥炒白芷茴香炒土烏藥炒陳枳殼麩炒若噁心薑汁炒甘草上方只此九味各等分水酒湯使隨證用之水酒相半亦可惟流注加獨活每服四錢病在上食後服病在下食前服此一藥流注癰疽發背傷折非此不能效至於救壞病活死肌弭患於未萌之前拔根於既愈之後中間君臣佐使如四時五行更相迭旺真神仙妙劑隨證加減其效無窮何則此藥大能順氣勻血故也夫氣陽也血陰也陽動則陰隨氣運則血行陽滯則陰凝氣弱則血死血死則肌死肌死則病未有不死者矣必調其陽和其陰然後氣血勻二者不可偏廢只調陽不和陰則氣耗而血凝肌必不活如五香連翹之類是已只和陰不調陽則血旺而氣弱疾必再作如內補十宣之類是已然二藥亦須參用之不可執一為妙此藥扶植胃本不傷元氣蕩滌邪穢自然順通不生變證真仙劑也用法開具於後一發背既久不愈乃前醫用涼藥過也涼藥內傷其脾外冰其血脾主肌肉脾土受傷飲食必減顏色痿瘁肌肉不生血為脈絡血一受冰則氣不旺肌肉糜爛故必理脾脾健肉自生宜於此方中去木通少用當歸倍加厚朴陳皮盛則用家傳對金飲子又盛則加白豆蔻之類為妙一凡治流注可加獨活流注者氣血凝滯故氣流而滯則血注而凝加此藥者可以動蕩一身血脈血脈既動豈復有流注乎一流注起於傷寒傷寒表未盡餘毒流於四肢經絡澀於所滯而後為流注也如病尚有潮熱則里有寒邪未盡散此方中可加升麻蘇葉如服此而熱不退可加乾葛如有頭疼加川芎並用姜水煎如無潮熱可用水酒相半煎酒大能行血生氣故也氣生血行病愈可必然流注須表者何也所以推其因究其源不忘病之根本也寒邪既盡表之太過則為冷流注尤為難治故宜略表為妙表後第二節宜服溫平之藥乃十宣內補是已如不效第三節宜加附子或服四桂散數服即止溫藥亦不可多用恐增痛苦反成膿血不幹第四節仍歸本方收效然表未盡則餘毒附骨而為骨癰夫流注者傷寒之餘毒骨癰者又流注之敗證也流注非傷寒之罪乃醫者表之未盡也骨癰非流注之過又庸醫涼藥之過也庸醫無識心盲志聾妄猶明見雖知為骨癰而治之無法又復投之涼藥烈之毒刃則毒氣滯涼藥觸鐵器則愈附骨而不能愈矣不然則人之骨何以有癰骨而成癰非藥所治故名附骨疽又名白虎飛尸留連周期輾轉數歲冷毒朽骨出盡自愈其不愈者至於終身有之此皆失於初也其骨腐者多為副骨尤或可痊正骨腐則終身廢疾故膿白而清者碎骨初脫肉深難取膿黃而濃者碎骨將出肉淺可取宜以利刀取之詳在後章此不過治骨癰之概耳又有病經數月傷於刀刃羸弱拳攣咳嗽膿血壞肉陰爛者此皆冷極陽弱陰盛不可以唾紅為熱宜以好附子加減治之又有毒自手腳頭面而起疼痛遍身上至頸項經絡所繫去處如瘍癧貫珠者此為風濕流氣之證宜以加減小續命湯及獨活寄生湯與此方參錯用之又有兩膝痛起以至遍身骨節皆痛婦人類血風男子類軟風此名風濕痹又名癧節宜以附子八物湯加減用之又有癰腫在項腋兩乳旁兩胯軟肉處名為𤷍癧癰此冷證無熱宜以內補十宣散與此方參用小兒不可輕用附子恐生驚癇切不可更犯針刀薄血無膿胬肉難合宜以溫熱藥貼散內消倘犯針刀生胬肉亦以此藥收功倘用藥微疼略有驚癇宜用全蠍觀音散加減用之驚定藥如故事又有小兒亦患宿痰失道者癰腫見於頸項臂膊胸背等處是為冷極全在熱藥敷貼之功留口病須再作為佳治法在後又有流注大如匏瓠覆碗見於胸背其證類發而甚惡用藥之後形勢一有微動即非發矣宜以內補十宣與此方隨證通變用之可以內消大抵諸證皆原於冷故為痛者骨痛也骨者腎之餘腎虛則骨冷骨冷所以痛所謂骨疽皆起腎者亦以其根於此也故補腎必須大附子方能作效腎實則骨有生氣疽不附骨矣凡用藥不可執一貴乎通變一凡癰疽初萌必氣血凝滯所成為日既久則血積於所滯而後盛作故病人氣血盛者此方中減當歸多則生血發於他所再結癰腫生生不絶斯乃祕傳醫者少知也一凡癰疽生痰有二證一胃寒生痰此方中加半夏健脾化痰二熱鬱而成風痰此方中加桔梗以化咽膈之痰並用生薑和水酒煎一凡腦發背發在上者此方中可去木通恐導虛下元為上盛下虛之病難於用藥老人虛弱者尤宜去之一凡病人有瀉者不可便用此方宜先用止瀉藥白礬生用為末溶開黃蠟為丸米飲下三十丸俟瀉止方用此藥蓋人身以血氣為主病癰之人氣血潮聚一處為膿若臟腑不固必元氣泄而血愈寒難愈此藥大能順氣故也大抵氣順則血行氣耗則血寒氣寒則血死血死則肌肉不生投之熱藥則肌肉無元氣不足以當之徒增苦投之涼藥則無是理是方雖仙授要在用之得當不然則有刻舟之患矣至於流注又不可一概論也若涼藥耗散元氣虛敗有用三建取效者其疾多緣於冷故也尤當審其脈辨其證的出於冷而然後用之亦不可過過亦有害但陽脈回腫處紅活骨有生氣寒氣不能相附為疽即歸功本方以取效此萬全妙法一此藥丸散末皆可水酒湯使臨時裁度用之貴人加木香為衣病者有熱痰咳嗽富沉香貧蘇葉湯皆可下丸用蜜為丸一此方非但治癰疽發背傷折至於男子婦人疝氣血氣皆可用屢獲效矣有一婦人患氣疾五年發時只是塊痛嘔逆水漿不下一發便死用此藥為丸木香湯下一服嘔止再服痰氣順遂愈一凡傷折皆不脫此方但加減有差詳見傷折類中如尋常打破傷損或傷心胞並皆治之在頭上則去木通枳殼加川芎陳皮常用加丁皮蘇葉能活血加破故紙五靈脂能破宿血水煎熟了卻用濃酒一盞浸入侯再沸卻入大黃末空心服之如通順藥只四服先二服中入大黃末後二服不必用只是催發便下如不通用枳殼湯一向催如若不通即不可治不可坐視人死而不知也補血十宣散之類一凡傷折常用此方可去木通名何首烏散蓋首烏能扶血故也如刀刃傷有潮熱面腫氣喘乃破傷風證可服索血散葛根湯數服薑蔥煎發散或敗毒散三四服外用敷貼藥依法治之無不愈者矣一經年腰痛加萆薢玄胡索以酒煎服一腳氣加檳榔木瓜穿山甲水煎服之一宿痰失道非惟人不識自仙授以來惟餘一派知之人身有痰潤滑一身猶魚之有涎痰居胃中不動則無病動則百病生或喘或咳或嘔或暈頭痛睛疼遍身拘急骨節痹疼皆外來新益之痰乃血氣敗濁凝結而成也何則臟腑氣逆鬱結生痰當汗不汗蓄積生痰飲食過傷津液不行聚而生痰其常道則自胃脘達肺脘而出其失道自胃脘而流散冷肌肉皮毛之間脾主肌肉肺主皮毛故凡胸背頭項腋胯腰腿手足結聚腫硬或痛或不痛按之無血潮雖或有微紅亦淡薄不熱堅如石破之無膿或有薄血或清水或如乳汁又有壞肉如破絮又恐如瘰癧在皮肉之間如雞卵浮浴於水中可移動軟活不硬破之亦無膿血針口胬肉突出惟覺咽喉痰實結塞作寒作熱即皆其證急於此方中加南星半夏等藥以治其內外用玉龍熱藥以拔其毒便成膿破為良其輕無膿者必自內消如熱極痰壅則用控涎丹紫大戟甘遂白芥子等分為末米糊為丸如遍身腫硬塊大如杯盂生於喉項要處者尤為難治夫血氣和暢自無他病氣行不順血化為痰痰復失道則血氣衰敗不能為膿但能為腫硬理必然也此證陽少陰多隨證用藥回陽生氣補血控涎外則用後法作起一身氣血引散冷塊萬一腫不消不作痛不為熱體氣實無他證肉塊與好肉無異此又一證也切不可輕用針刀自戕如草醫曾用針灸陰爛其肉或用毒藥點脫使人憎寒壯熱法當通順其氣血於此方中加升麻以除其寒邪用斂口結痂之藥以安之使為疣贅而已萬一病自作臭穢糜爛不免動刀則有妙劑可以代刀不可輕泄即白礬枯朴硝二味為末敷之一肚腸內癰宜服十宣散與此方相間用之並加忍冬藤此藥最治內癰但當審其虛實或通或補補須用附子通則用大黃如不明虛實則此方亦自能通順十宣自能內補可無他變至於肺癰初覺飲食有礙胸膈微痛即是此證急須察脈審其虛實虛則用此方加附子相出入用之若稍再作即用十宣散內補之即自消散實則用此方加大黃略通之使毒氣下宣為妙蓋肺與大腸相表裡故也如內癰已成宜以海上方與此方加減參用之喘咳膿血者肺癰也大便有膿自臍出者肚癰也忍冬藤甘草節煮酒妙用敷貼溫藥第三沖和仙膏一名黃云膏又名仙膏冷熱不明者用之茶酒隨證治之川紫荊皮五兩重炒又名紅肉又曰內消獨活三兩重炒不用節赤芍藥二兩重炒白芷一兩重不見火木臘又名望見消陽春雪隨加減妙即石菖蒲上五件併為細末用法詳見於後夫癰疽流注雜病莫非氣血凝滯所成遇溫即生遇涼即死生則散死則凝此藥是溫平紫荊皮木之精能破氣逐血消腫獨活土之精能止風動血引氣拔骨中毒去痹濕氣更能與木臘破石腫堅硬赤芍藥火之精微能生血住痛去風木臘水之精能生血住痛消腫破風散血白芷金之精能去風生肌止痛蓋血生則不死血動則流通肌生則不爛痛止則不掀作風去則血自散氣破則硬可消毒自散五者交攻病安有不愈乎一凡病有三證治有三法如病極熱則此方中可倍加紫荊皮木臘少用三品亦能消散之但功少遲耳如病極冷則此方微加赤芍藥獨活亦能活血而消散之功亦稍遲而不壞病一如病熱勢大盛切不可用酒調但可用蔥泡湯調此藥熱敷上蔥亦能散氣故也血得熱則行故熱敷也如病稍減又須用酒調酒能生血遇熱則血愈生酒又能行血遇溫則血愈行矣一瘡面有血泡成小瘡不可用木臘恐性黏起藥時生受宜用四味先敷後用木臘蓋在上面覆過四圍以截助攻之血路凡敷藥皆須熱敷干則又以元湯濕透之使藥性濕蒸而行病自退矣一如用正方四面黑暈不退瘡口皆無血色者是人曾用冷藥大過不可便用玉龍蓋肌未死也恐藥力緊添痛苦宜於此方加肉桂當歸以喚起死血自然黑暈退見功效血回即除加藥只以正方取效一如用正方痛不住可取酒化乳香沒藥於火上使熔然後將此酒調藥熱塗痛止一流注筋不伸者可於此方加乳香敷之其性能伸筋故也一如瘡口有赤肉突出者其證有三一是著水二著風三是刀破後刀口翻突宜以此方加少南星以去風用薑汁酒調其不消者必是庸醫以手按出膿核大重又以涼藥涼了皮以致如此若投以熱藥則愈糜爛此又有口訣焉宜用白礬枯朴硝二味為末敷之次用硫黃掞之外服榮衛加對金飲外貼沖和一若病勢熱盛者不可便用涼藥熱盛則氣血壅會必多大涼則血退不徹返凝於涼故宜溫冷相半用之血得溫則動挾涼則散可用此方加對停洪寶丹用蔥湯調塗貼之一此方乃發背流注之第一藥也學者當通變妙用表裡相應則病在掌握之中但發背甚者死生所繫惟此藥功最穩重終始可恃決無變壞若發之輕者草醫亦能取效然有變證流弊之患此無他發於陰則非草醫之可治矣豈如是劑兼陰陽而並治奪造化之神功哉至如流注一疾雖不能死人而十有九為廢疾廢疾流連死亦隨之縱有醫之能愈者亦必半年周歲之後方見其效此乃百中之一然終為殘弱之身矣惟吾此派仙方藥奇效速萬不失一端有起死回生之效非言所能盡述夫流注乃傷寒之餘毒也故有表未盡者餘毒客於經絡氣血不勻則為熱流注所謂醫之能愈者熱也熱病少見有表散大過氣血衰者餘毒流入腠理腠理或疏或密為冷流注所謂醫之難愈者冷也冷病常多故傷寒表未盡者非特為熱證而已其餘毒亦多為冷證皆原於腎虛故作骨疽冷則氣愈滯而血愈積故但能為腫而不能為膿若醫者投之以涼劑則所謂冷其所冷而陰死於陰惟有壞爛肉腐毒氣著骨而為骨癰流為廢疾故曰骨癰者流注之敗證也又曰骨癰非流注之罪乃醫者涼劑之過也流者動也注者住也氣流而滯則血注而凝氣為陽血為陰陽動則陰隨氣運則血行吾所以能移流注於他處而散之者取其能動故也動則可移陽既移而動矣陰豈能獨住而不隨之者乎是故以獨活引之者以其性能動蕩氣血也引之一動則陰陽調和不能為膿而散之於所移之處勢必然矣一流注在背膊腰腿緊要處當用此方厚敷患處卻單用一味獨活末酒調熱塗一路其盡處以玉龍誘之此移法也使血氣趨於他所聚於無緊要處作膿又或消之若以成膿則引不下急將此藥拔之出毒氣免作骨疽如庸醫用了涼藥犯了針刀使成骨癰非藥所愈又待其碎骨出盡方愈若怯用針刀取之則用玉龍治法在後若正骨出無治法副骨出可安一方用白芷紫荊皮酒調以內消初生癰腫名一勝膏又方只用赤芍藥木臘紫荊皮作箍藥名三勝膏一方治大人小兒偶含刀在口割斷舌頭已垂落而未斷用雞白軟皮袋了舌頭用破血丹蜜調塗舌根斷血卻以蜜調和蠟稀稠得所調此正方敷在雞子皮上取性軟薄能透藥性故也如在口溶散勤勤添敷三日舌接住方可去雞子白皮只用蜜蠟調藥勤勤敷上七日全安學者觀此則知通變活法妙用不在師傅之功如無速效以金瘡藥參錯治之尤妙尤妙一治癰腫未成膿不可使用洪寶丹敷貼頭上恐為冷藥一冰血凝不消不能成膿反能爛肉只用此方敷貼如不消欲其成膿卻以玉龍貼癰頭以燥之次用此正方在玉龍之下四圍用洪寶丹箍住以截新潮之血又若病未甚冰於涼藥者玉龍之下不必用此方只以洪寶丹圍之一如救壞病未見可用玉龍只用此方自然穩當免病人苦一發背初生未成單用紫荊皮末酒調箍住自然撮細不開服藥只用柞木飲子乃救貧良劑也一此方加南星草烏二味三分之二熱酒調敷諸癰可以潰膿不痛若單玉龍要洪寶丹箍住實此法妙一猘犬咬人單用紫交沙糖調塗留口金丹退腫嚼杏仁置口中去毒一法加南星草烏二味與此方各一半熱酒調敷可治久損至妙至妙一小兒軟節用此方加軍姜酒調敷若初發只用此方酒調敷成膿而止若初發之時用紫荊皮木臘酒調敷可以必消切不用洪寶丹一熛疽心火熱毒也見於五心痛不可忍其狀如泡瘡而血赤外形雖小內有熱毒在心醃者難治在手足心者可療然治之須早稍遲或在心醃則腐肉粉碎神仙莫醫凡有此疾在手心則用洪寶丹於手心環圍敷之以截其血卻用沖和於手心留口收功在腳心則用洪寶敷在腳脛交骨四圍一二寸長以沖和收功如前敷貼熱藥第四回陽玉龍膏性熱草烏三兩重炒南星一兩重煨軍姜二兩重煨白芷一兩重不見火赤芍藥一兩重炒肉桂半兩重不見火一此方治陰發背冷流注鼓椎風久損痛冷痹風濕諸腳氣冷腫無紅赤者冷痛不腫者足頑麻婦人冷血風諸陰證之第一藥也用熱酒調塗用法詳具於後一夫雜病雖見於皮膚手足之間而因必本於五臟六腑蓋臟腑之血脈經絡一身晝夜運行周而復始一臟受病必見於本臟脈息所經之處即陰陽分手足之所屬也其為病有冷有熱熱者易治冷者難療夫冷必由臟腑元陽虛弱然後風邪得以乘間而入血氣不勻遂自經絡而客於皮膚之間脈息不能周流遂澀於所滯愈冷則愈積而不散復加庸醫用涼劑而內外交攻則其為病鮮有不危者矣學者當觀其外之為證而察其內之所屬表裡相應萬無失一此藥有軍薑肉桂足以為熱血生血然既生即熱而不能散又反為害故有草烏南星足以破惡氣驅風毒活死肌除骨痛消結塊喚陽氣又有赤芍白芷足以散滯血住痛苦生肌肉加以酒行藥性散氣血雖十分冷證未有不愈端如發寒灰之焰回枯木之春大抵病冷則肌肉陰爛不知痛癢其有痛者又多附骨之痛不除則寒根透髓非尋常之藥所能及惟此藥大能逐去陰毒迎回陽氣住骨中痛且止肌肉皮膚之病從可知矣但當斟酌用之不可大過則為全美治法加減疏舉如下一發背發於陰又為冷藥所誤又或發於陽而誤於藥冷陽變為陰滿背黑爛四周好肉上用洪寶丹把住中間以此藥敷之一夜陽氣回黑者皆紅察其紅活即住此藥卻以沖和收功如不效欲作膿又以南星草烏加於沖和用之如陽已回黑已紅惟中間一點黑爛不能紅者蓋血已死可以朴硝明礬又云白丁香硇砂乳香用唾調勻於黑紅交處作一圈上用沖和蓋之至明早起藥自然去黑肉如割卻以藥洗之掞以生肉合口收功一流注冷證多附骨內硬不消骨寒而痛筋縮不伸若輕用刀針並無膿血若只有乳汁清流或有瘀血宜用此藥敷之若稍緩止以軍薑白芷肉桂草烏等分熱酒調敷骨寒除而痛止則氣溫和而筋自伸肉硬自消矣然治流注不可無木臘以其性能破積滯之氣消堅硬之腫最妙又不可多多則能解藥性蓋此證主於溫藥故也一鼓椎風起於中濕或傷寒餘毒又或起於流注之壞證或起於風濕虛痹此證有三一是兩膝相搕行步振掉膝𦚐脛骨微腫二是膝𦚐脛骨交接處大如椎腿股肉消皮縮裹骨三是上腿腫大下股冷消蓋足膝屬肝肝經有風寒濕氣則血脈不流而作此遂為膝寒所澀凝流不動下股之血脈有去而無返是以愈瘦愈冷而筋愈縮上腿之血脈有積而無散是以愈腫愈熱而肉愈瘦其原若起於流注則肉凝者為爛爛則冷毒腐骨腐骨一出神仙無術未破則肌肉尚未死急以此藥熱酒調敷膝𦚐骨上腿處以住骨痛回陽氣又以沖和塗下腿冷處引其血氣使流動而不通貫血脈又以此方敷脛骨交處以接所引之血脈以散所積之陰氣內則用追風丸倍加乳香以伸筋如法服之無不愈者如人欲出方可用五積散加薑桂芷歸又加大川烏牛膝檳榔木瓜或茶或酒調之一男子婦人久患冷痹血風手足頑麻或不能舉動可用綿子夾袋此藥在中心卻以長長纏在痛處用絹袋系定此藥能除骨痛附在肉上覺皮膚如蟻緣即其功也如痹可加丁皮吳茱萸沒藥大川烏等分然後全在追風丸表裡交攻去病如神一風腳痛不可忍內用追風丸外用此方加生面薑汁調熱敷欲得立止可依法加乳香沒藥化開酒調為妙一久損入骨者蓋因墜壓跌撲傷折不曾通血以至死血在所患之處久則如雞肺之附肋輕者苔蘚之暈上年少之時血氣溫和尤且不覺年老血衰遇風寒雨濕其病既發宜以此方熱酒調敷內則用搜損尋痛丸表裡交攻為妙雖然血氣虛弱之人病在胸肋腰背之間者謂之脫垢不除變為血結勞不論老少年遠近歲大而遍身小而一拳半肘醫之則一此等乃根蒂之病此非一劑可愈磨以歲月方可安未成勞者易已成勞者難一法只用南星草烏加少肉桂能去黑爛潰膿謂之小玉龍此法大效一治石癰用此方熱酒調敷外卻用洪寶箍住四圍待成膿後破一婦人乳癰多因小兒斷乳之後不能回化又有婦人乳多孩兒飲少積滯凝結又為經候不調逆行失道又有邪氣內鬱而後結成癰腫初發之時切不宜用涼藥冰之蓋乳者血化所成不能漏泄遂結實腫核其性清寒若為冷藥一冰凝結不散積久而外血不能化乳者方作熱痛蒸逼乳核而成膿其苦異常必爛盡而後已故病乳癰者既愈則失其乳矣蓋乳性最寒而又滯以涼劑則陰爛宜也然涼藥亦未嘗不用用於既破之後則佳如初發之時宜於此方中用南星薑汁酒兩停調勻熱敷即可內消欲急則又佐以草烏此藥味性烈能破惡塊逐寒熱遇冷即消遇熱即潰如已成癰腫易又從沖和依常法用之或加此草烏南星二味亦可破後觀其原原於冷用沖和收功原於熱用洪寶生肌且須用乳沒住痛以減其苦至於吃藥只用栝蔞散隨人虛實參以通順散十宣相間服之多口者為乳發乳房堅硬者為乳石正在乳嘴處腫者為吹乳在乳兒囊下為乳漏以肉懸垂而血易滿故也故為難治一囊一口為乳癰五十歲老人無治法外有老人乳節又為可治蓋在垂囊肉上為癰若近腦則為節矣一宿痰失道癰腫無膿者可用此藥點頭病必旁出再作為佳不然則元陽虛耗此為敗證如元陽虛耗敗證者急用全體玉龍敷之拔出成膿服藥則通順散加桔梗半夏當歸肉桂等藥若病紅活熱驟則當歸沖和為佳切不可誤投涼劑此方但能拔毒作膿病回即止不可過若能參用陷脈神劑尤妙出外科精要一肚癰一證十有九死蓋胃屬陰外寒裡熱凡氣血潮聚趨熱避寒故多為內癰不能外現間有微影欲出則又為冷藥所蠲及服涼劑雖有神仙莫施其功醫者可不慎乎凡有此證初覺腰痛且以手按之痛苦走閃移動則為氣塊若根不動外面微有紅腫則為內癰急以此方拔出毒氣作成外癰然後收功沖和內則用通順散加忍冬藤治法如前若癰自能外現者不必用此方只用沖和為妙不可輕用針刀如犯鐵器口不能合只用玉龍貼癰頭上四面以沖和圍之依法自破若膿流不快依法用洪寶三分薑汁七分茶調敷之膿出皆盡內用十宣平補生肌外則依然收功沖和此證陰多陽少損人最害將安之際倍服內補以生氣血庶幾易愈否則消而復脹口不合既安之後尤宜多服內補加附子否則氣弱難平證冷者未破之先尤宜先服附子方好既破之後切不可用急澀斂口之藥恐炲毒不散服藥力到自然合口至於內癰已成不能拔出只用沖和外貼使在外溫合成膿自臟腑而出不至肉爛死生所繫全在服藥之功治法見前最忌毒食食毒即發反復雜療又有孕婦病此者又與此異內用紫蘇飲安胎勿輕與他藥若臨月則兒與膿俱下若尚遠則膿自大腑中下若初萌只服藥可消若癰在外面其證必熱惟可用沖和收功亦須審輕重用之恐有誤也敷貼涼藥第五洪寶丹又名金丹寸金四黃散一黃散又名破血丹黃藥天花粉三兩重薑黃一兩重白芷一兩重赤芍藥二兩重上為末茶酒湯使隨證熱塗諸般熱證癰腫之毒金瘡之證此一藥一涼而已能化血為水又能使血瘀積又能涼肌生肉去死肌爛肉及能破血退腫又能滯氣為浮能止痛又能為痛閉膿又能出膿一反一復此方藥性無他遇涼效少遇熱效多故非十分陽證不可輕用恐或凝寒治療費力若夫金瘡出血非此不可乃第一藥餘外但可為前二藥之佐使爾當審之審之大抵此三藥可合力同功者可獨將專權者可分司列職者可合圍交攻者可借援求救者可勇力相持者可正兵先鋒奇兵取勝者可奇兵先鋒正兵取勝者神聖工巧端與兵法無異然兵隨印轉將遂令行故立功取勝存乎其人苟非明理通變之士何足言哉用法如後一若病勢大熱可用熱茶調敷如證稍溫則用酒調若用以撮膿可用三分薑汁七分茶調何也此藥最涼能使血退薑汁性熱能引血潮故血退則被引血潮被逐進退相持而後成膿作破逼膿盡流也一凡瘡口破處肉硬不消者瘡口被風所襲也此方中加獨活以去風用熱酒調如又不消則風毒已深肌肉結實又加紫荊皮有必消之理矣一此方莫善去金瘡及諸熱症赤腫斷諸血根不使掀赤若癰疽不可輕用恐貼處不散炲毒入內在骨則成骨癰在喉項則毒氣聚喉在胸背則陰爛臟腑在腹肚則為內癰殺人不救可不慎哉只以沖和玉龍依法詳證用之為妙一年少血壯之人衰老血敗之士如有濺血無藥可止血盡人亡若在手足可用茶調敷手足上下尺余遠若在胸背腰腹則全體敷之把住血路方能止卻用斷血藥五倍末方見後或神效軍中方掞口方得安愈一治金瘡重者筋斷脈絶血盡人亡如要斷血須用繩及絹袋縛住人手臂卻以此方從手臂上用茶調敷住血路然後卻用斷血藥掞口卻不可使內補及四物等藥卻又能令人發嘔吐甚則口眼喎邪少焉發煩發熱成破傷風只可下對金飲加川芎白芷薑棗煎自安卻徐徐補血如或有破傷風證又須用破傷風藥即葛根湯之類方見後瘡口用軍中方加九肋鱉甲酥炙碾一凡金瘡在頭面上者血不止急用此方茶調團圍敷頸上截血瘡口邊亦用此敷軍中方掞口重十日輕者三日效一凡金瘡著水肉翻花者可用薤汁調此方敷瘡口兩旁以火微灸之或用早稻稈煙燻之瘡口水出即愈如無水出即是風襲可用南星茶調敷之即愈然後以軍中方掞口妙一治婦人産後或經絶血行逆上心不能主或吐血鼻衄舌衄可以此方用井花水調敷頸上生艾汁調亦妙其血立止然後服藥以絶原如舌衄必有血泡破之復脹可用線於舌根頸縛住勿除於頸項上截血內用黃芩荊芥涼心之藥以收其原舌上用蜜調結口之藥以治之泡破除線血不脹矣服涼心藥四物湯加荊芥薄荷硃砂一此方用藥調塗熱毒恐隨干隨痛赤腫不退當用雞子清調敷諸熱毒難乾妙湯火瘡同一打破傷損在胸膈上者藥通血不下可用緑豆水調此藥末吞之即吐出而安又有從高墜下用通血藥不下數日病人幾死此必天時寒凍服大黃等藥冰之血凝片不行可用熱酒調軍薑末飲之片時血通人得更生蓋借熱性以活死血則前藥方能行矣合用諸方第六黃礬丸即護膜散明礬一兩重生用為末黃蠟上以蠟熔開出火俟及九分冷傾入礬末在內和為丸如梧桐子大每服十丸加至二十丸或米湯下未破者即潰已破者即合大能護膜救心防毒內攻柞木飲子治發背癰疽已成未成並宜服之此乃救貧良方干柞木葉四兩乾荷葉心蒂萱草根甘草節地榆各一兩重上為散每服半兩水二碗煎至一碗分作二服早晚各進一服再合滓煎有膿者自干成膿者自消忌一切毒食之物三石散治患瘡消渴小便數宜服此藥人參白朮當歸白芍藥各一錢桔梗知母山梔子各二錢茯苓連翹天花粉乾葛各二錢肉桂藿香木香各半錢甘草六錢朴硝一兩六錢寒水石石膏各八錢滑石一兩大黃八錢上為末散每服五錢水一盞姜三片煎至一半用布絹絞汁入蜜少許服漸加一兩重一日三服常使小便疏通如有自利不用朴硝大黃外科精要八味丸亦治此證栝蔞散治癰疽栝蔞新舊皆可和椒炒碎川椒二十粒甘草三四寸銼乳香五粒如皂角子大上用無灰酒三碗煮作一碗去滓溫服其毒立散未成即破已成者膿自出皆不用手海上方治內癰有膿敗血腥穢殊甚遂至臍腹冷痛此乃敗膿所致用此方推膿下血白芷一兩白芍白礬枯各半兩單葉紅蜀葵根二兩上為末蠟礬熔為丸如梧桐子大空心食前米飲下三十丸俟膿出盡十宣散補之一方用豬膏煎鯽魚治腸癰一方以鱉甲燒存性服之真君妙貼散通明硫黃三兩蕎麥粉二兩上作末以井花水調和稀稠得所捏作餅子曬乾或焙乾收之如有惡瘡再用研碎以井花水調敷之如痛即不痛如不痛即痛而愈追風丸治男子婦人冷痹血氣手足頑麻流注經絡成鼓椎風並皆治之沉香五錢重焙牛膝酒浸炒當歸各三兩重焙薏苡仁白芷川芎各二兩重羌活防風炒川烏一隻泡赤芍炒天麻炒草烏炒黃肉桂乾薑炒各一兩丁皮乳香沒藥木香各五分重木瓜炒三兩重上為末蜜丸每服三十丸酒下如腳氣用酒糊為丸溫酒下為末則用酒調服忌熱食搜損尋痛丸能接骨遍身疼痛久損至骨如金刃傷則後用之乳香二錢沒藥二錢當歸一兩軍姜五錢炒肉桂三錢川芎一兩薏苡仁炒一兩如筋絶脈絶多加此一味丁皮五錢獨活五錢炒茴香二錢炒草烏五錢炒黃色骨碎補二兩炒赤芍五錢炒石黏藤炒五錢云二兩白芷炒五錢上作末蜜為丸用生薑細嚼溫酒吞下如為末用姜酒調服亦可浸酒吃亦可如折傷則須用藥遍身頑麻方可用藥接骨加草烏一匕多熱酒調服量人老弱虛實加減用之如其人麻不解可用大烏豆濃煎汁解之如無豆淡煎濃豉亦可如吐加薑汁復煎散治癰疽發背黃柏黃芩黃連知母生地黃各一錢酒洗防己山梔羌活黃耆麥門冬甘草炙獨活各半錢人參半錢當歸尾二錢陳皮防風梢生甘草梢生蘇木當歸身五味子豬苓藁本連翹桔梗各一錢上㕮咀每服四錢水二盞煎至七分去滓隨證上下食前後服神鋒散又名替針膏餅藥針水白丁香七粒硇砂一字上用針水調勻敷貼烏金散去惡肉潰滯膿巴豆半錢寒食麵二兩上用水和麵作餅子巴豆燒黑色量瘡口大小干掞之索血散凡刀刃傷有潮熱面腫氣喘乃破傷風者此藥亦以治之乾葛虛弱老人出血多者去此加川芎代防風赤芍細辛羌活桔梗炒甘草肉桂白芷各三錢上為散薑蔥煎服葛根湯治刀刃傷後發寒熱男女流注初發潮熱紅腫赤痛者以此發散升麻一兩葛根二兩甘草二錢半夏蘇葉白芷丁皮川芎香附子陳皮各五錢上為散每服二錢薑蔥煎空心服之散血散被刀刃傷血出過多用此藥補之人參當歸白芷白茯苓黃耆各五錢砂仁陳皮丁香各二錢枳殼炒牛膝酒浸各三錢川芎一兩蒼朮炒茴香炒甘草各一錢肉桂一錢若去血多多用此一味上為㕮咀每服三錢薑棗煎不拘時凡瘡口及杖瘡要生肉須服此藥或十宣散亦可通血散如肉傷無血者及打撲遍身赤腫大小便不通服此通之大黃三錢麵裹煨當歸三錢焙上用蘇木枳殼煎湯調溫服如用酒加童便有潮熱不用酒如不通用炒枳殼煎湯引發雞鳴散亦通血大黃末生用杏仁去皮尖炒上為末調服伯顏丞相軍中方治刀箭兵刃所傷乳香沒藥羌活紫蘇細辛烏藥麝香半字蛇含石煅厚桂白芷不見火降香當歸蘇木檀香龍骨南星硫黃寄生尾花蕊石童便淬十數次上等分為末干掞傷處止血止痛去風生肌瘡口四圍用洪寶丹敷貼神妙熏洗方凡患一切癰疽發背諸瘡打破傷損骨斷未破或未斷而腫痛者並皆治之桑白皮殺傷此為主白芷一兩半赤芍二兩烏藥腫骨痛此為主左纏藤荊芥橘葉藿香臭爛加此桕葉根亦可上銼散隨證加減每藥一兩重用水二碗煎如洗金瘡加荊芥桑白皮臭加藿香毒瘡加烏桕根皮溫溫用瓶斟洗如傷損遍身重者可於小房內無風之處用火先燒紅大磚數片先用熱藥湯熏洗如氣息溫又用紅磚逐旋淬起藥氣令熱得少汗出為妙麝香輕粉散又名桃花散生肉合口去痛住風一切癰瘡傷折口不合用藥洗後以此方干掞乳香沒藥五倍子焙為主白芷不見火去風生肌赤芍散血止痛輕粉國丹水飛赤石脂煅性急麝香血竭止血生肉檳榔止血宣郎當歸酒浸焙洗海螵蛸上研為細末掞口神異四七膏治一切疰瘡惡瘡毒瘡久不愈者即愈乳香沒藥防風羌活白芷赤芍當歸宣連肉桂皂角五倍子巴豆去殼木鱉子國丹萆麻子無名異檳榔水粉輕粉楓香蓽茇一用烏葉松香黃蠟各等分桃柳槐枝蠟膏清油上除乳沒麝輕粉丹另研外先用清油煎諸藥令焦方下楓香松香黃蠟蠟膏又熬令熔用絹濾去前藥卻下國丹水粉再熬令紫色然後下乳沒麝輕末用桃柳槐枝不停手攪勻滴水不散為度將瓦器收貯出火毒方用又方止血生肉合口通變用法滑石性緩寒水石煅石膏煅性緩番香燒雄黃住臭去爛龍骨煅性急穿山甲灰炒能去水百草霜王不留行炒止血劉寄奴炒止血金櫻子九里光止血苧根燒存性老松皮燒存性上各為細末加減用之住痛一黑散亦能止血百草霜苧根燒存性番降燒存性掞口用先用老松皮燒存性為末能住刀口杖瘡一切痛不止者亦能止之神效復元通氣散治一切惡瘡初覺發時連進三服癰疽丁瘡腫痛並皆治之當歸三兩甘草一兩生地黃半兩黃耆一兩白芍一兩天花粉一兩熟地黃半兩金銀花二兩上㕮咀每服五錢水一盞半煎至一盞去滓溫服隨證上下食前後服本方藥品今注於後異名馬肝石上何首烏碧蓮虋水通可呼紅牡丹名赤芍藥陽春木臘水菖蒲又名陽春雪望見消快胃香茴香更好長生草獨活人蘇金鴉散草烏形變虎骨膏南星不殊淮上橘來為枳殼龍泉香炒軍姜敷補血脂當歸酒焙寶鼎香薑黃最殊玉箭名為香白芷土烏藥化土木蘇金屑香桂不見火紫霞膠即紫荊呼玉髓瓊漿番乳沒天花粉瑞雪模糊國老實名為甘草尋方取類可相扶製法白芷肉桂不見火何首烏不犯鐵器土烏藥赤芍茴香紫荊皮望見消軍姜並炒獨活去節炒當歸酒洗焙枳殼煨甘草炙木通去皮節南星煨淮草烏煨薑黃天花粉生用增添別本經驗諸方治癰疽發背內補散專治癰疽發背潰濃出多內虛少力不進飲食有陰證惡重者亦治之人參白茯苓當歸黃耆桂心遠志各半兩芎藭一兩麥門冬一兩甘草半兩白芍陳皮熟地黃五味子各一兩上㕮咀水一盞半生薑三片棗三枚同煎溫服又方用附子桂心乾薑白蘞人參川椒各二錢芎藭二兩赤小豆一合半黃芩防風甘草各一兩半上為㕮咀每服四錢入酒煎溫服之內補黃耆散治癰疽內虛不足膿水不絶四肢乏弱不進飲食久不好者必為內漏附子黃耆肉蓯蓉遠志麥門冬熟地黃巴戟各一兩白茯苓白芍人參石斛甘草各三錢北五味山茱萸菟絲子當歸芎藭地脈石葦各五錢上為細末每服二錢以荊芥湯送下治消渴證多發癰疽之疾吃此水立效上收下臘月水以搊取絲留湯澄清冷溫服二十三次病退不渴沉香散治諸發腫毒入腹心煩脹滿不進飲食沉香木香薰陸香丁香大黃各一兩麝香少許上為㕮咀入水煎溫服乳香散治發背內潰及毒氣攻衝嘔逆噁心內攻危證凡惡疽疔瘡癤宜日進一二服便毒出外不攻臟腑之證乳香別研真緑豆粉以緑豆去皮亦可用上研為極細末每服一錢重新汲井水少許調服細細呷之要經絡發背大疽自肩下連腰脅腫盛其堅如石極紫黑醫以陳藥敷之中夜大嘔乃連進此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日而愈又有一患瘰癧者疼痛輒嘔服此嘔逆即止草節煎湯調服亦可內消散治癰疽發背諸瘡癤結硬疼痛不止人參當歸黃耆川升麻沉香黃芩防己防風瞿麥白蘞甘草各一兩赤小豆一合炒熟上為細末每服二錢不拘時溫酒調服麥門冬散治發背乳癰赤腫疼痛體熱大煩渴不止黃耆黃芩門冬各一兩半川升麻赤茯苓赤芍玄參當歸甘草知母栝蔞根各一兩生地黃上㕮咀每服四錢水煎溫服熱甚加淡竹葉燈草木通散治癰疽諸發氣壅大小便不通木通黃芩大黃土瓜根漏蘆甘草朴硝各二錢梔子仁三錢上㕮咀水煎溫服以利為度瞿麥散治癰疽發背排膿止痛利小便桂心赤芍當歸黃耆芎藭瞿麥白蘞門冬各等分赤小豆一合酒浸炒乾如諸癰已潰未潰瘡中膿血不絶痛不可忍者加細辛白芷白蘞薏苡仁上為㕮咀每服四錢酒煎溫服不止麒麟散治癰疽惡瘡生肌後行房事用力勞動努復出血不止血竭檳榔白芨黃連黃柏訶子各半兩總為細末用雞子白調塗敷之用紙貼之藥干即換不用水調仙方化痰丹明礬遲礬大半夏湯洗七次大南星各二兩一半湯洗七次一半皂角煮內用南星一半切作片子卻用不蛀皂角截斷七片各長一寸用水同南星煮乾為度去了皂角只用南星焙乾將前藥總為細末水打硬麵糊候冷用濃生薑自然汁在內化開麵糊為丸如梧桐子大每服三五十丸空心臥用淡薑湯吞下立效肺癰黃耆散亦名桔梗湯治肺癰心胸氣壅咳嗽膿血肩背煩悶小便赤黃大便多澀不進飲食黃耆天門冬川大黃紫蘇葉赤茯桑白皮生乾地黃各一兩杏仁蒺藜枳殼各一錢當歸甘草各半兩加貝母薏苡仁上為㕮咀生薑三片水煎溫服桔梗丸治肺癰胸中滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如硬米粥者用桔梗半兩貝母半兩巴豆一錢去油上為細末煉蜜為丸如梧桐子大強人進粥飲下五丸羸人下三丸若病在膈上者吐出也若膈下者利出也若下多不止者冷飯三四匙補之即止治腸癰壯熱大微汗氣急小腹腫痛小便澀似淋或大便澀難如刀刺痛及背肺疼痛腸中已成膿或大便下膿者用當歸一兩微炒甜瓜子一合蛇蛻皮一尺長上為㕮咀每服四錢水一盞半煎至一盞去滓食前服之利下惡物為妙效矣牡丹散治腸中未成膿腹中疼痛不可忍者木香牡丹敗醬甜瓜子赤芍桃仁芒硝川大黃微炒各三兩上為咀散用水煎服茯苓湯治腸癰小腹牽強按之疼痛小便不利時時有汗出惡寒脈遲未成膿也赤茯桃仁甜瓜子川大黃微炒川芒硝牡丹上㕮咀用水煎服三四日即愈牛黃散治腸癰成膿者治之牛黃一錢血竭半錢大黃牙硝牽牛牛蒡子破故紙總為細末用溫酒調服以利下膿血為度千金方凡人患腸癰其狀兩耳輪文理甲錯初患腹中苦疼痛或繞臍痛有瘡如粟皮熱便膿血似赤白下者不治者必死也漏蘆湯漏蘆黃芩白芨麻黃去節大黃各三兩升麻白薇枳殼去白麵炒芍藥粉草各二兩炙上為㕮咀每服四錢水一盞煎至七分空心熱服本方黃芩去之若見熱而實者加大黃五兩或加芒硝亦可升麻和氣飲治瘡疥發於四肢痛癢不常甚至憎寒發熱腫下濕癢並皆治之升麻乾葛桔梗蒼朮各一兩枳殼半夏制乾薑各半兩陳皮白芷甘草各一兩茯苓當歸大黃蒸各半兩芍藥七錢半上㕮咀每服四錢水一盞生薑燈心同煎食前溫服復元通氣散治諸氣澀耳聾腹癰便癰瘡疽無頭止痛消腫青皮陳皮各四兩穿山甲炮甘草半生熟栝蔞根各三兩金銀花一兩加連翹大黃當歸各半兩皂角刺一兩上為細末熱酒調下或用酒煎亦可黃耆茯苓湯治諸癰疽膿出大多虛熱不停赤茯苓升麻大黃黃耆黃芩遠志赤芍各一兩甘草人參當歸生地黃各二兩麥門冬一兩半上㕮咀每服四錢水煎服之大效治諸疔瘡方法如疔瘡初出以不變色及不知疼痛按搖不動嵌頂身發寒熱便是此瘡氣疔水火疔蛇眼石疔雄雌疔爛疔血疔刀斧疔紅絲魚睛紫硯麻子諸般疔急用圈黃藥用臘月間雄豬膽一個入雄黃京墨薑汁末入為於膽內用此藥塗在瘡上圈之便不走黃元疔發之上便打一針直到痛處便住血出無妨便入仙蟾拔毒取黃藥入於瘡口內即用水沉膏貼之神應膏亦可取黃回時以瘡紅腫為度四圍腫可以放針出血毒黃水如是走黃看血筋到何處以用火針刺斷其血筋立住便不走黃看先黃走入何處結成一塊便是黃者可以黃上便放三五十針等出血及毒氣即用敷黃藥敷出毒矣如是黃走者左過右右過左者難治之必死也瘡上黃上放針無血出如血紫黑者難治亦死也用針取黃不用鐵針只用金銀銅針者初發急服追疔奪命湯即能內消立效以服飛龍奪命丹亦可後服化毒消毒托裡散以服諸藥皆要大汗出為度取蟾酥法度上將活蝦蟆眉稜上用手裹捻油紙上或是黃桑葉上便有蟾酥用竹篾青刮離紙葉上便於原刮竹篾上插在背陰處經宿酥自然干收用之追毒丹取黃去疔頭追膿毒立效蟾酥一錢乾用老酒化蜈蚣酒浸炙乾黃硇砂一錢白丁香一錢無此味加巴豆巴豆七粒去殼不去油雄黃二錢輕粉一錢硃砂二錢為衣如無黃丹亦可總為細末面調水為丸如丸不就用酒打麵糊為丸如麥大兩頭尖入於針破口內用水沉膏貼之後用膏藥及生肌藥迫出膿血毒物又如有黑陷漏瘡者四圍死敗肉不去不生肌者不可治也亦用此藥追毒去死肌敗肉生新肉愈矣小者用一粒大者加用之病輕者不必用針只以手指甲爬動於瘡頂上安此藥水沉膏貼之其瘡即時紅腫為度去其敗肉為妙用之神效立驗水沉膏將白芨末放在盞內用水沉下去用紙貼之如用膏不可用生肌藥方在前敷黃藥蟬蛻殭蠶又方絲瓜葉連須蔥白韭又方蒼耳根苗燒灰白監梅灰藍靛為妙總為細末酸醋調塗四周留瘡口上毒出如干再以醋常常潤濕為度如不退加前敷藥化毒散血拔毒散立效疔瘡陷頂專治疔瘡發背諸般惡瘡癤及膿水不幹者以用鐵鏽不拘多少研為細末用醋調塗疔瘡上須臾疔毒自然凸出膿水即干立效追疔奪命湯祕方速效能內消腫羌活獨活青皮多用防風多用黃連赤芍細辛甘草節蟬蛻殭蠶腳連各等分加河車澤蘭金銀有膿加首烏白芷要利加青木香大黃梔子牽牛在腳加木瓜上㕮咀每服五錢先將一服加澤蘭少用葉金銀花各一兩生薑十片同藥擂爛好酒鏇之熱服不吃酒者水煎為妙然後用酒水各一盞半生薑十片煎至熱服汗出為度病退減後再加大黃二錢煎至熱服再以利一兩服去餘毒為妙此方以藥味觀之甚若不切然效速於神驗萬無一失纍用纍效如有別證再出宜隨證加減治之速效若心煩嘔吐加甘草節一錢豆粉酸漿水下嘔逆噁心加乳香豆粉甘草湯下紫河草老薑用米醋一口吞下心煩嘔名伏暑用硃砂五苓散嘔逆加母丁香石連不止用不換金正氣散又加人參木香嘔不止因吃水多手足冷以黃連香薷散吞之消暑丸冷不止者加宣木瓜牽牛心煩加麥門冬赤芍梔子燈草潮熱加北柴胡黃芩淡竹絲茅根眼花加硃砂雄黃麝香少許腹脹加薏苡仁寒水石自利加白朮白茯苓肉豆蔻米殼腹內痛不止加南木香乳香喘嗽加知母貝母蜜少許頭疼加川芎白芷蔥白痛不止加蘿蔔子川芎蔥白擂碎敷於太陽即止痰涎多加生艾尾葉用米醋擂取汁嗽去痰咽喉痛加山豆根靈消根梔子淡竹葉艾葉燈草大便祕加赤芍薑製枳殼大腹皮小腑祕加赤芍赤茯木通車前燈草尿血出加生地黃車前鼻血出加野紅花地黃藕節姜皮生用骨蒸加絲茅根無脈服二十四味流氣飲瘡不痛頂不起灸三狀更不痛不治祕方加進葉速效內消一生受用矣飛龍奪命丹專治疔瘡發背腦疽乳癰疽附骨疽一切無頭腫毒惡瘡服之便有頭不痛者服之便痛已成者服之立愈此乃惡證藥中至寶病危者服之立可矣萬無失一此乃家傳之祕方一生受用不敢輕泄神速之驗即愈立效蟾酥二錢乾者老酒化血竭一錢乳香二錢沒藥二錢雄黃三錢輕粉半錢膽礬一錢麝香半錢銅緑二錢寒水石一錢硃砂一錢為衣海羊二十個蝸牛即是連殼用之腦子半錢無亦可天龍一條酒浸炙黃去頭足上為細末先將海羊研為泥和前藥為丸如緑豆大如丸不就入酒打麵糊為丸每服二丸先用蔥白三寸令病人嚼爛吐於手心男左女右將藥丸裹在蔥白內用無灰熱酒三四盞送下於避風處以衣蓋覆之約人行五里之久再用熱酒數杯以助藥力發熱大汗出為度矣初覺二丸即消如汗不出重者再服二丸汗出即效三五日病重者再進二丸即愈如疔瘡走黃過心者難治之汗出冷者亦死矣如病人不能嚼蔥擂碎裹藥丸在內熱酒送下瘡在上食後服瘡在下食前服服此藥後忌冷水黃瓜茄子油豬雜魚肉濕面一切發風發瘡毒類之物不可食之又忌婦人洗換狐臭百發百中此藥活人多矣歌括血竭蟾酥輕粉雄黃銅緑硃砂膽礬寒水麝香加三七海洋研化專治疔瘡惡毒腦疽發背無差如緑豆大二丸佳細嚼蔥酒送下衣被蓋之汗出返魂救死堪誇神仙傳與世人家奪命金丹無價凡患疔瘡癰疽等瘡癤毒專治此瘡能令內消去毒化為黑水從小便出萬無失一此方不得祕又不許輕泄謹之慎之寶之可也乳香知母半夏天花粉可加貝母穿山甲白芨皂角銀花各一錢上為㕮咀用無灰酒一碗煎至半碗去滓只作一服溫服不得加減再將滓搗碎為細末加秋過芙蓉葉一兩用蜜調井花水及敷藥於瘡口上如干再用蜜水潤濕過一宿自然消不必用第二服雄黃丸利大腑去毒積鬱金雄黃各半兩大戟芒硝各一兩巴豆四十粒去殼不去油上為細末麵糊為丸如緑豆大每服七八九丸用巴豆半粒擂爛冷白湯送下如要打痰以桑白皮杏仁煎湯冷吞下即行又方以大戟為末每服三四錢茶清調服即行又方如要下積用江子二十一粒木香丁香桃仁各等分為細末麵糊為丸如緑豆大溫白湯吞下過藥江子一兩豆豉二兩上為細末麵糊為丸每服七丸白湯送下即行忌食熱湯物過後以溫白粥米湯補之拔黃藥用蟾酥飛羅面為丸如梧桐子大可將一丸放在面前舌下即時黃出百二散又名護心散治發疔瘡煩躁手足不住發狂者急宜服之甘草節緑豆粉硃砂各等分上為細末甚者水調服之大效返魂丹治病同前麝香少許雄黃二錢蟾酥一字江子七粒去殼燈上燒存性上為末和酥點舌上三次含化咽之其疔自爆勿用鐵器忌之治瘰癧神效方法凡患瘰癧不問年深月久者先用箍子箍住其瘡以後用艾火從下面兒癧上灸一個起以等下灸上去灸到母發之處即住每一個上用大蒜一片貼之灸五七壯止隨灸一個便用膏藥貼之當時一日一換立見神效矣祕傳膏藥真緑豆二兩半炒用銅銚子炒黃色枯了為妙檀香半兩焙乾用香竭香節亦可膽礬半兩真者取毒生肌後不用此味乳香沒藥各半兩痛用輕粉匣子亦好少用南蛇膽無亦可麝香破者可用初灸不用上為細末諸藥半兩可用豆粉五兩米醋調成膏攤開油紙上貼之不生肌加生肌藥即愈矣五香連翹散治一切積熱結核瘰癧癰疽惡瘡腫癤沉香連翹去蒂桑寄生升麻亦可丁香去枝梗射干獨活乳香升麻大黃蒸要利生用木通羌活甘草麝香破者用青木香各等分又方加生黃耆上為㕮咀每服四錢水二盞煮取八分食後熱服以利下惡毒為度本方有竹瀝芒硝隨證熱輕重當自加減為妙再用此滓煎湯洗之其瘡即愈立效散又名六一散益無散瘰癧初發之時服此藥即安滑石一兩甘草二錢二味為末先將此末每服一錢半米飯調服臨睡進一服半夜再進一服又方用荊芥穗殭蠶黑牽牛各四錢斑蝥二十八個去頭足翅入糯米炒黃色去斑用米總為細末每服一錢至五更初時用溫酒調服等惡物從小便中出如小便無惡物行次日再進一服又不行第三日早五更初先進白糯米稀粥卻又再一服更以燈草湯調琥珀末一錢服之以小便內利下惡物為效絶根不發如肚疼痛不止利惡毒不住可用生冷茶補之肚痛不止用防風擂水解之前藥不可多用牛蒡子丸治風毒結核瘰癧腫痛不止牛蒡子微炒首烏各一兩干薄荷雄黃各二兩牛黃麝香各二錢皂角七皮水二升捶汁煉膏上以為末用皂角膏為丸如梧桐子大每服二十丸煎黃耆湯下四聖散治瘰癧去利後用此補之海藻石決明羌活瞿麥穗各等分上為細末每服二錢米湯調下經驗治咽喉方法夫咽喉者為一身之總要與胃相接呼吸之所從出若有胸膈之間蘊積熱毒致生風疾壅滯不散發而為咽喉之病喉內生瘡或狀如肉腐為腫為痛窒塞不通吐咽不下甚則生出重舌治之尤宜先去風痰以通咽膈然後解其熱毒遲則有不救之患又有熱毒衝於上齶而生瘡謂之懸癰及腑寒亦令人咽門吐吞不利臨病須當審詳其證施以法治化毒托裡散治咽喉風熱上攻急閉腮頰腫痛並雙蛾單蛾結喉重舌木舌並皆治之以利即解玄參木通大黃生用淡竹葉梔子生地黃燈草各等分上為㕮咀每服水煎溫服灌漱急解用水清油調皂角末百草霜吞下亦可山豆根湯治咽喉腫閉疼痛灌漱去痰噙之咽下即愈山豆根解毒靈霄根生肌梔子淡竹葉艾葉燈草上為㕮咀吃酒者用酒煎不飲酒者水煎亦可有孕婦人不可服若諸喉生瘡者好了吃此藥五六服絶根好矣吹喉祛風散治咽喉中生瘡腫痛纏喉風閉單蛾雙蛾結喉急喉風飛緣入喉重舌木舌等證膽礬鴨觜炒腦子一字碧雪白殭蠶炒去絲苦丁香即甜瓜蒂不用多燈草米糊漿炒若病不退加雄黃豬牙皂角去皮炙黃焰硝藜蘆上為細末每用少許吹入喉中未成者速散已成者即破立愈重者吹入鼻中如痰多急解用生艾尾葉米醋同擂取汁噙之灌漱去痰立愈矣又方用臘月豬膽以明礬為末入在膽內風中吹乾取礬碾末吹之立效每年發者可灸火不發又方若牙關緊閉者取九龍川名金叉草單枝上為妙只用根不用皮打碎用綿子裹著縛在筋頭上以去五六次於牙關上牙關即開又以喉中五六次痰涎即出後用火炙鹽為末綿子帶鹽去潤之即愈進食後有返復取生薑捶碎將皂角炙過炙鹽為末用綿子裹姜帶鹽並皂角末去潤五六次即能愈矣治纏喉閉急證以米醋生薑同擂灌之喉瘡即破鼓槌草土牛膝加烏藥為妙上二味生擂碎取汁用醋灌下重者灌於鼻中吐痰即愈乾者為末米醋煎之亦可矣如聖散治急時氣纏喉風漸入咽塞水穀不下牙關緊急不省人事並皆治之雄黃藜蘆生白礬牙皂去皮炙黃加蠍梢七枝上為細末每用一字吹入鼻中吐出頑痰愈矣又方用白藥山豆根同煎噙之灌漱後咽下一二口即愈經驗治瘋狗咬人方法如若瘋狗才傷人之時即便吃清油半盞能清其心急取雄黃炒斑蝥去頭翅足研為細末一日服一個用雄黃以酒調服至七七四十九個以服四十九日少用冷水入清油亦可若小便利下惡毒為度如不利者多進一服利後肚腹疼痛急用冷水調青靛服之以解其痛再以黃連水煎服之亦可服藥之後不得便吃熱物即絶根愈矣瘡口莫等好如不破可以灸破待出血去毒氣再不發也如是小便出血不可治也此之必死矣治傷人死對周急解之凡傷人已後至一年或一百日內發者已死但心間溫者便可救之急取槐花一斤用酒水二大碗煎至碗半以溫服之不能用者挑開口灌入喉中少時便能蘇省一個時辰之後用溫清粥與吃之此個即無事矣如若不然再將藥滓煎服之不可與冷水及羊肉一應發風毒類之物切須忌之又方若復發者無藥可療用之極驗雄黃明者五錢重麝香五錢重上各研為細末勻和一處用好酒調二盞服之如不能服者則捻其鼻而灌之服藥已後必然得睡切莫驚起任其自醒後利下惡物再進藥數服即見此藥效矣又經驗方法用杏仁不拘多少去其皮尖又以馬藺根一處同研細先以蔥煎湯洗之然後再以此藥敷之或單以杏仁一味去皮尖用之亦可又方用萆麻子五十粒去殼以井花水研成膏先以鹽湯洗淨後敷之又方用虎骨油搽之即可立見效矣
